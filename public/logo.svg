<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- OneTracker "1T" — every stroke IS a trackable medium:
       "1" = play flag + a stack of books + a gamepad base
       "T" = TV antennas + film-strip crossbar + popcorn-bucket stem
       Gold 3D gradients + soft drop shadows on true AMOLED black. -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#ffe566"/>
      <stop offset="45%" stop-color="#ffd60a"/>
      <stop offset="100%" stop-color="#d9a400"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#f2c94c"/>
      <stop offset="100%" stop-color="#a87c00"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="#000000"/>

  <g filter="url(#drop)">
    <!-- ============ digit 1 ============ -->
    <!-- flag: 3D play/clapper wedge -->
    <path d="M66 210 L138 152 V266 Z" fill="url(#goldDark)"/>
    <path d="M66 210 L138 152 v22 L84 212 Z" fill="url(#shine)" opacity="0.5"/>
    <!-- stem: a stack of three books (spines out) -->
    <rect x="126" y="150" width="78" height="78" rx="9" fill="url(#gold)"/>
    <rect x="126" y="150" width="78" height="22" rx="9" fill="url(#shine)"/>
    <rect x="150" y="163" width="40" height="8" rx="4" fill="#000" opacity="0.75"/>
    <rect x="134" y="232" width="66" height="74" rx="9" fill="url(#goldDark)"/>
    <rect x="150" y="245" width="34" height="8" rx="4" fill="#000" opacity="0.75"/>
    <rect x="128" y="310" width="74" height="76" rx="9" fill="url(#gold)"/>
    <rect x="150" y="324" width="38" height="8" rx="4" fill="#000" opacity="0.75"/>
    <!-- base: gamepad -->
    <rect x="92" y="390" width="164" height="60" rx="30" fill="url(#gold)"/>
    <rect x="92" y="390" width="164" height="20" rx="10" fill="url(#shine)"/>
    <path d="M138 405 h12 v9 h9 v12 h-9 v9 h-12 v-9 h-9 v-12 h9 z" fill="#000"/>
    <circle cx="206" cy="412" r="7" fill="#000"/>
    <circle cx="224" cy="428" r="7" fill="#000"/>

    <!-- ============ letter T ============ -->
    <!-- TV antennas -->
    <path d="M352 116 L318 66 M352 116 L390 66" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
    <circle cx="316" cy="64" r="11" fill="url(#gold)"/>
    <circle cx="392" cy="64" r="11" fill="url(#gold)"/>
    <!-- crossbar: film strip -->
    <rect x="244" y="118" width="216" height="78" rx="13" fill="url(#gold)"/>
    <rect x="244" y="118" width="216" height="24" rx="13" fill="url(#shine)"/>
    <g fill="#000">
      <rect x="258" y="128" width="22" height="13" rx="3"/>
      <rect x="296" y="128" width="22" height="13" rx="3"/>
      <rect x="334" y="128" width="22" height="13" rx="3"/>
      <rect x="372" y="128" width="22" height="13" rx="3"/>
      <rect x="410" y="128" width="22" height="13" rx="3"/>
      <rect x="258" y="173" width="22" height="13" rx="3"/>
      <rect x="296" y="173" width="22" height="13" rx="3"/>
      <rect x="334" y="173" width="22" height="13" rx="3"/>
      <rect x="372" y="173" width="22" height="13" rx="3"/>
      <rect x="410" y="173" width="22" height="13" rx="3"/>
    </g>
    <!-- stem: popcorn bucket with stripes, kernels peeking at the top -->
    <circle cx="330" cy="206" r="12" fill="#fff3d6"/>
    <circle cx="352" cy="200" r="13" fill="#ffe9b8"/>
    <circle cx="373" cy="207" r="11" fill="#fff3d6"/>
    <path d="M310 208 h84 l-11 224 h-62 z" fill="url(#gold)"/>
    <path d="M326 208 l-4 224 h13 l3-224 z" fill="#000" opacity="0.8"/>
    <path d="M355 208 l-1 224 h13 l0-224 z" fill="#000" opacity="0.8"/>
    <path d="M384 208 l-6 224 h-6 l5-224 z" fill="#000" opacity="0.8"/>
  </g>
</svg>
