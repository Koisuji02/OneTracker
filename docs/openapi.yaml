# OpenAPI-style description of every EXTERNAL endpoint OneTracker consumes.
# The app is client-only: these are third-party APIs, listed here so the
# integration surface is explicit and reviewable.
openapi: 3.0.3
info:
  title: OneTracker — consumed external APIs
  version: "2.0"
  description: >
    OneTracker is a local-first tracker (React + IndexedDB). It talks directly
    to the public APIs below from the browser. Keys, when required, are stored
    in localStorage and entered by the user in Settings.

servers: []

paths:
  # ------------------------------------------------------------- TMDB
  /tmdb/search/tv:
    get:
      responses: { "200": { description: OK } }
      tags: [TMDB]
      summary: Search TV series (anime filtered client-side)
      description: GET https://api.themoviedb.org/3/search/tv?query=…&language=…
  /tmdb/search/movie:
    get:
      responses: { "200": { description: OK } }
      tags: [TMDB]
      summary: Search movies
  /tmdb/tv/{id}:
    get:
      responses: { "200": { description: OK } }
      tags: [TMDB]
      summary: Series details
      description: append_to_response=credits,external_ids — seasons, next_episode_to_air, in_production, imdb id
  /tmdb/tv/{id}/season/{n}:
    get:
      responses: { "200": { description: OK } }
      tags: [TMDB]
      summary: Episode list of one season (titles, runtimes, air dates, stills)
  /tmdb/movie/{id}:
    get:
      responses: { "200": { description: OK } }
      tags: [TMDB]
      summary: Movie details (credits appended, imdb_id included)

  # ------------------------------------------------------------- AniList
  /anilist/graphql:
    post:
      responses: { "200": { description: OK } }
      tags: [AniList]
      summary: Anime niche-search tail, score enrichment, legacy chain items
      description: >
        POST https://graphql.anilist.co — keyless GraphQL. Queries used:
        SEARCH (Page.media — Anime-row tail + keyless fallback), SCORE
        (averageScore/idMal by title or id, for TMDB-anime and MangaDex-manga
        rating banners), NODE + FULL (legacy anilist: items only:
        PREQUEL/SEQUEL season chain, characters, nextAiringEpisode).

  # ------------------------------------------------------------- MangaDex
  /mangadex/manga:
    get:
      responses: { "200": { description: OK } }
      tags: [MangaDex]
      summary: Manga search (the Manga row source; alt-titles match localized queries)
      description: >
        GET https://api.mangadex.org/manga?title=…&limit=14&includes[]=cover_art
        &order[relevance]=desc&contentRating[]=safe|suggestive|erotica —
        memoized 60s, also feeds the Books/Comics manga cross-filter.
  /mangadex/manga/{id}:
    get:
      responses: { "200": { description: OK } }
      tags: [MangaDex]
      summary: Full manga details (title, it/en description, cover, tags, authors)
      description: GET https://api.mangadex.org/manga/{id}?includes[]=cover_art&includes[]=author&includes[]=artist
  /mangadex/statistics/manga/{id}:
    get:
      responses: { "200": { description: OK } }
      tags: [MangaDex]
      summary: Community rating (bayesian) for the ratings banner
  /mangadex/chapter:
    get:
      responses: { "200": { description: OK } }
      tags: [MangaDex]
      summary: Latest released chapter (number + readableAt date)
      description: GET https://api.mangadex.org/chapter?manga=…&order[chapter]=desc

  # ------------------------------------------------------------- Open Library
  /openlibrary/search.json:
    get:
      responses: { "200": { description: OK } }
      tags: [OpenLibrary]
      summary: Book search (subject field used to filter manga out)
  /openlibrary/works/{id}.json:
    get:
      responses: { "200": { description: OK } }
      tags: [OpenLibrary]
      summary: Work details (description, covers, authors)
  /openlibrary/works/{id}/ratings.json:
    get:
      responses: { "200": { description: OK } }
      tags: [OpenLibrary]
      summary: Community rating (average /5)

  # ------------------------------------------------------------- RAWG
  /rawg/games:
    get:
      responses: { "200": { description: OK } }
      tags: [RAWG]
      summary: Game search (requires key)
  /rawg/games/{id}:
    get:
      responses: { "200": { description: OK } }
      tags: [RAWG]
      summary: Game details (description, playtime, metacritic, rating)

  # ------------------------------------------------------------- SteamGridDB
  /steamgriddb/search/autocomplete/{term}:
    get:
      responses: { "200": { description: OK } }
      tags: [SteamGridDB]
      summary: Find a game id by title (Bearer key)
  /steamgriddb/grids/game/{id}:
    get:
      responses: { "200": { description: OK } }
      tags: [SteamGridDB]
      summary: 600x900 titled box art for a game (any platform)

  # ------------------------------------------------------------- Comic Vine
  /comicvine/search:
    get:
      responses: { "200": { description: OK } }
      tags: [ComicVine]
      summary: Comic volume search (requires key; JSONP because no CORS)
      description: resources=volume — name, image, start_year, count_of_issues
  /comicvine/volume/4050-{id}:
    get:
      responses: { "200": { description: OK } }
      tags: [ComicVine]
      summary: Volume details (deck/description, publisher, count_of_issues)

  # ------------------------------------------------------------- Ratings
  /omdb:
    get:
      responses: { "200": { description: OK } }
      tags: [Ratings]
      summary: IMDb / Rotten Tomatoes / Metacritic scores by IMDb id (requires key)
      description: GET https://www.omdbapi.com/?apikey=…&i=tt…
  /jikan/{kind}/{malId}:
    get:
      responses: { "200": { description: OK } }
      tags: [Ratings]
      summary: MyAnimeList score (keyless)
      description: GET https://api.jikan.moe/v4/anime/{id} or /manga/{id}

  # ------------------------------------------------------------- Google
  /google/oauth-token:
    post:
      responses: { "200": { description: OK } }
      tags: [Google]
      summary: GIS token client (drive.appdata + userinfo scopes)
  /google/drive/files:
    get:
      responses: { "200": { description: OK } }
      tags: [Google]
      summary: Find the backup file in appDataFolder
  /google/drive/upload:
    post:
      responses: { "200": { description: OK } }
      tags: [Google]
      summary: Create/update onetracker-backup.json (multipart / media PATCH)
  /google/userinfo:
    get:
      responses: { "200": { description: OK } }
      tags: [Google]
      summary: Profile of the connected account (name, email, picture)

tags:
  - name: TMDB
    description: "TV series & movies — key required (v3 or v4 token)"
  - name: AniList
    description: "Anime & manga — keyless"
  - name: MangaDex
    description: "Chapter counts/dates for ongoing manga — keyless"
  - name: OpenLibrary
    description: "Books — keyless"
  - name: RAWG
    description: "Games — key required"
  - name: ComicVine
    description: "Western comics — key required, JSONP transport"
  - name: SteamGridDB
    description: "Titled game box art, all platforms — key required"
  - name: Ratings
    description: "OMDb (key) and Jikan/MAL (keyless)"
  - name: Google
    description: "Optional Drive backup + account link"
